version: '3.9'

services:
  govote:
    image: ghcr.io/waldirborbajr/govote:latest
    container_name: govote
    restart: always
    ports:
      - "8080:8080"   # HTTP (redireciona para HTTPS)
      - "8443:8443"   # HTTPS
    volumes:
      - ./votes.db:/votes.db   # Persistência do banco SQLite
      # - ./cert.pem:/cert.pem     # se quiser usar certificados próprios
      # - ./key.pem:/key.pem
    environment:
      - TZ=America/Sao_Paulo
      # Obrigatório em produção: gere valores aleatórios longos, ex.
      # `openssl rand -hex 32`, e nunca reutilize os defaults de dev.
      - GOVOTE_JWT_SECRET=changeme-generate-a-long-random-value
      - GOVOTE_CPF_PEPPER=changeme-generate-a-long-random-value
      # Só defina como "true" se houver um proxy reverso confiável na frente
      # (nginx, Cloudflare etc.) que sobrescreve X-Forwarded-For/X-Real-IP.
      # Caso contrário, o rate limiter pode ser burlado forjando esses headers.
      - GOVOTE_TRUST_PROXY_HEADERS=false
      # Usado só para calcular turnout_pct em /admin/stats. Ainda não vem de
      # uma fonte real de eleitores elegíveis — ver TODO no PR.
      - GOVOTE_TOTAL_ELIGIBLE_VOTERS=1000
